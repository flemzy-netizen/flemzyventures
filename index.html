<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flemzy phones sales Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .stat-card h3 { color: #666; font-size: 1em; margin-bottom: 10px; }
        .stat-card .stat-number { font-size: 2em; font-weight: bold; color: #333; }
        .form-section { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 1em; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .search-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .search-box { display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; }
        .table-container { background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 15px; border-bottom: 1px solid #dee2e6; }
        .low-stock { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><img src="pic.jpeg" alt="Logo" style="max-height: 80px; border-radius: 10px; vertical-align: middle;"> Flemzy_Phones Sales Tracker</h1>
            <p>Cloud Edition - Data synced to Google Sheets</p>
        </div>

        <div class="stats-container">
            <div class="stat-card"><h3>Total Products</h3><div class="stat-number" id="totalProducts">0</div></div>
            <div class="stat-card"><h3>Total Value</h3><div class="stat-number" id="totalValue">GHC0.00</div></div>
            <div class="stat-card"><h3>Low Stock Items</h3><div class="stat-number" id="lowStock">0</div></div>
        </div>

        <div class="form-section">
            <h2>➕ Add New Product</h2>
            <form id="addProductForm">
                <div class="form-grid">
                    <div class="form-group"><label>Product Name *</label><input type="text" id="productName" required></div>
                    <div class="form-group"><label>Category *</label>
                        <select id="productCategory" required>
                            <option value="Android">Android</option><option value="Stickers">Stickers</option>
                            <option value="Keypadphone">Keypadphone</option><option value="Apple">Apple</option>
                            <option value="Accessories">Accessories</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Price (GHC) *</label><input type="number" id="productPrice" step="0.01" required></div>
                    <div class="form-group"><label>Quantity *</label><input type="number" id="productQuantity" required></div>
                    <div class="form-group"><label>Description</label><textarea id="productDescription" rows="2"></textarea></div>
                </div>
                <button type="submit" class="btn" id="submitBtn">Sync to Cloud</button>
            </form>
        </div>

        <div class="search-section"><div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search products..."></div></div>

        <div class="table-container">
            <table>
                <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Value</th><th>Description</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="6" style="text-align:center">Fetching data...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
       const sheetURL = "https://script.google.com/macros/s/AKfycbjJ1vHhB60b4BLhiDGq8JjCB7ce78ROmL1cjvBT4czoFCpnPBZF7vsqfUa6l7XCLkm-kA/exec"; 
        let products = [];

        async function loadData() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.json();
                
                // This captures the Date from Column A (index 0)
                products = data.map((row, index) => ({
                    rowIndex: index + 2, 
                    date: row[0] ? new Date(row[0]).toLocaleDateString() : 'N/A',
                    name: row[1],
                    category: row[2],
                    price: parseFloat(row[3]),
                    quantity: parseInt(row[4]),
                    description: row[5]
                }));
                render();
            } catch (e) { 
                document.getElementById('tableBody').innerHTML = "<tr><td colspan='7'>Error loading data. Check headers!</td></tr>"; 
            }
        }

        async function syncToSheet(payload) {
            const btn = document.getElementById('submitBtn');
            btn.textContent = "Syncing..."; btn.disabled = true;
            await fetch(sheetURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            // Wait 2 seconds for Google to finish writing before reloading
            setTimeout(() => { loadData(); btn.textContent = "Sync to Cloud"; btn.disabled = false; }, 2000);
        }

        document.getElementById('addProductForm').addEventListener('submit', (e) => {
            e.preventDefault();
            syncToSheet({
                item: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: document.getElementById('productPrice').value,
                status: document.getElementById('productQuantity').value,
                description: document.getElementById('productDescription').value
            });
            e.target.reset();
        });

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            document.getElementById('tableBody').innerHTML = filtered.map(p => `
                <tr>
                    <td>${p.date}</td>
                    <td><b>${p.name}</b></td>
                    <td>${p.category}</td>
                    <td>GHC${p.price.toFixed(2)}</td>
                    <td class="${p.quantity < 5 ? 'low-stock' : ''}">${p.quantity}</td>
                    <td>GHC${(p.price * p.quantity).toFixed(2)}</td>
                    <td><button class="btn btn-delete" onclick="alert('Open your Google Sheet to remove Row ${p.rowIndex}')">Del</button></td>
                </tr>
            `).join('');
            updateStats();
        }

        function updateStats() {
            const totalVal = products.reduce((sum, p) => sum + (p.price * p.quantity), 0);
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('totalValue').textContent = 'GHC' + totalVal.toFixed(2);
            document.getElementById('lowStock').textContent = products.filter(p => p.quantity < 5).length;
        }

        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
